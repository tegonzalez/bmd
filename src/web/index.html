<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bmd preview</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Top bar -->
  <header id="top-bar" class="top-bar">
    <div class="top-bar-left">
      <div class="file-tab">
        <svg class="file-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span id="filename" class="filename">Untitled</span>
        <button id="lock-badge" class="lock-badge" title="Toggle edit lock" aria-label="Toggle edit lock">
          <svg id="lock-icon-locked" class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <svg id="lock-icon-unlocked" class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
          </svg>
        </button>
      </div>
      <div class="toolbar-separator"></div>
      <button id="undo-btn" class="toolbar-btn toolbar-btn-disabled"
              title="Undo (Ctrl+Z)" aria-label="Undo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v6h6"/>
          <path d="M3 13a9 9 0 0 1 15.36-6.36L21 9"/>
        </svg>
      </button>
      <button id="redo-btn" class="toolbar-btn toolbar-btn-disabled"
              title="Redo (Ctrl+Shift+Z)" aria-label="Redo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 7v6h-6"/>
          <path d="M21 13a9 9 0 0 0-15.36-6.36L3 9"/>
        </svg>
      </button>
    </div>
    <div class="top-bar-right">
      <button id="color-toggle" class="color-toggle" title="Toggle color mode" aria-label="Toggle color mode">
        <span id="color-icon" class="color-icon"></span>
      </button>
    </div>
  </header>

  <!-- Main area -->
  <main id="main-area" class="main-area" data-mode="both">
    <div id="editor-pane" class="editor-pane">
      <!-- Tiptap editor mounts here (Plan 03) -->
    </div>
    <div id="divider" class="divider"></div>
    <div id="preview-pane" class="preview-pane">
      <!-- Preview content renders here (Plan 03) -->
    </div>
  </main>

  <!-- Bottom bar -->
  <footer id="bottom-bar" class="bottom-bar">
    <div class="status-left">
      <div id="notification-area" class="notification-area"></div>
    </div>
    <div class="mode-switcher">
      <button class="mode-btn" data-mode="editor">Editor</button>
      <button class="mode-btn active" data-mode="both">Both</button>
      <button class="mode-btn" data-mode="preview">Preview</button>
    </div>
    <div class="status-right"></div>
  </footer>

  <script type="module" src="./app.ts"></script>
</body>
</html>
